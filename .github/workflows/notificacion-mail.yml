name: Send Email Notification

on:
  push:
    branches:
      - main
      - feature_a
      - feature_b

jobs:
  send-email:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Cambios subidos a rama ${{ github.ref_name }}"
          to: tu-correo@gmail.com
          from: "GitHub Actions <tu-correo@gmail.com>"
          body: |
            ¡Hola!
            
            Se han detectado cambios en tu repositorio.
            
            Rama: ${{ github.ref_name }}
            Autor: ${{ github.actor }}
            Commit: ${{ github.sha }}
            
            Puedes revisar los cambios en:
            ${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}